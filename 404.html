<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirection - L<i class="fas fa-moon"></i>una</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .content {
            max-width: 600px;
            padding: 40px;
        }
        .moon-icon {
            font-size: 4rem;
            color: #e94560;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            background: linear-gradient(135deg, #e94560, #f47068);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: transform 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="content">
        <div class="moon-icon">
            <i class="fas fa-moon"></i>
        </div>
        <h1>Redirection en cours...</h1>
        <p>Vous allez être redirigé vers la page d'accueil dans quelques secondes.</p>
        <a href="index.html" class="btn">
            <i class="fas fa-home"></i> Aller à l'accueil
        </a>
    </div>
    
    <script>
        // Redirection automatique après 3 secondes
        setTimeout(function() {
            window.location.href = 'index.html';
        }, 3000);
    </script>
</body>
</html>
